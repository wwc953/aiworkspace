version: '3.8'

services:
  mysql:
    # image: mysql:5.7.44
    image: centos/mysql-57-centos7:latest
    container_name: mysql-57-udf
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    volumes:
      # - ./plugins:/opt/rh/rh-mysql57/root/usr/lib64/mysql/plugin
      - ./source:/home
