# Spring Boot Application Properties

# Nacos Server Configuration
server.port=8848

# Database Configuration (for persistent storage)
spring.datasource.platform=mysql
db.num=1
db.url.0=jdbc:mysql://mysql:3306/nacos_devtest?characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=UTC
db.user=nacos
db.password=nacos

# Nacos Authentication
nacos.core.auth.enabled=true
nacos.core.auth.server.identity.key=serverIdentity
nacos.core.auth.server.identity.value=security
nacos.core.auth.plugin.nacos.token.secret.key=SecretKey012345678901234567890123456789012345678901234567890123456789

# JVM Settings
JVM_XMS=256m
JVM_XMX=256m
JVM_XMN=128m

# Logging Configuration
logging.level.com.alibaba.nacos=INFO
logging.level.org.springframework.cloud.alibaba.nacos=DEBUG