version: '3.8'

services:
  # Nacos Server - 服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: netty-springcloud-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - SPRING_DATASOURCE_PLATFORM=mysql,mysqldb
      - MYSQL_SERVICE_HOST=localhost
      - MYSQL_SERVICE_DB_NAME=nacos_devtest
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_USER=nacos
      - MYSQL_SERVICE_PASSWORD=nacos
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - JVM_XMS=256m
      - JVM_XMX=256m
      - JVM_XMN=128m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/data:/home/nacos/data
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - netty-network
    restart: unless-stopped

  # Nacos Discovery Service
  nacos-discovery:
    build:
      context: .
      dockerfile: docker/Dockerfile.nacos-discovery
    container_name: netty-springcloud-nacos-discovery
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      nacos:
        condition: service_healthy
    ports:
      - "8848:8848"
    volumes:
      - ./logs/nacos-discovery:/app/logs
    networks:
      - netty-network
    restart: unless-stopped

  # Nacos Config Service
  nacos-config:
    build:
      context: .
      dockerfile: docker/Dockerfile.nacos-config
    container_name: netty-springcloud-nacos-config
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      nacos:
        condition: service_healthy
    ports:
      - "8848:8848"
    volumes:
      - ./logs/nacos-config:/app/logs
    networks:
      - netty-network
    restart: unless-stopped

  # Netty Service - 核心业务服务
  netty-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.netty-service
    container_name: netty-springcloud-netty
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xms512m -Xmx1024m
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
    depends_on:
      nacos:
        condition: service_healthy
    ports:
      - "8082:8082"
    volumes:
      - ./logs/netty-service:/app/logs
    networks:
      - netty-network
    restart: unless-stopped

  # API Gateway - 统一入口
  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: netty-springcloud-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xms256m -Xmx512m
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
    depends_on:
      nacos:
        condition: service_healthy
      netty-service:
        condition: service_started
    ports:
      - "9000:9000"
    volumes:
      - ./logs/api-gateway:/app/logs
    networks:
      - netty-network
    restart: unless-stopped

  # Redis (可选，用于缓存)
  redis:
    image: redis:6-alpine
    container_name: netty-springcloud-redis
    command: redis-server --appendonly yes --requirepass "redis_password"
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - netty-network
    restart: unless-stopped

  # MySQL (可选，用于Nacos持久化)
  mysql:
    image: mysql:8.0
    container_name: netty-springcloud-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=nacos_devtest
      - MYSQL_USER=nacos
      - MYSQL_PASSWORD=nacos
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - netty-network
    restart: unless-stopped

  # Prometheus + Grafana (监控)
  prometheus:
    image: prom/prometheus:latest
    container_name: netty-springcloud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - netty-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: netty-springcloud-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - netty-network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_storage:

networks:
  netty-network:
    driver: bridge
    name: netty-springcloud-network

# Docker Compose命令说明
# docker-compose up -d           # 启动所有服务
# docker-compose down            # 停止并移除所有服务
# docker-compose logs -f         # 查看实时日志
# docker-compose exec <service> bash # 进入容器