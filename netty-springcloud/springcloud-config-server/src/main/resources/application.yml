server:
  port: ${PORT:${SERVER_PORT:8848}}

spring:
  application:
    name: nacos-config-server
  profiles:
    active: dev
  cloud:
    nacos:
      config:
        server-addr: localhost:${server.port}
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: netty-service.yaml
            group: DEFAULT_GROUP
            refresh: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    com.alibaba.nacos: INFO
    com.alibaba.cloud.nacos: INFO